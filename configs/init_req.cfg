
req_init.reason_unaccepted_requests = "Method Not Allowed"
req_init.sip_code_unaccepted_requests = 405

route[REQINIT] {

    if(has_totag())
        return;

    xlog("L_NOTICE", "[REQINIT] Init Request received $ru from $si\n");

    if(is_present_hf("Route")) {
        remove_hf("Route");
        msg_apply_changes();
    }

	if (is_method("CANCEL")) {
        if (t_check_trans()) {
			route(RELAY);
		}
        xlog("L_NOTICE", "[REQINIT] received $ru, that does not belong to any transaction, let's silently exit.");
		exit;
	}

    if (is_method("SUBSCRIBE|PUBLISH")){
        xlog("L_NOTICE", "[REQINIT] Not supporting relaying of $rm request's\n");
        sl_send_reply("$ccp(req_init.sip_code_unaccepted_requests)", "$ccp(req_init.reason_unaccepted_requests)");
        exit;
    }

    #!ifdef WITH_DMQUEUE
        route(HANDLE_KDMQ_REQUEST);
    #!endif

    route(LOCATION);

    route(ASSERT_DIRECTION);

    route(RECORD_ROUTE);

    route(DISPATCH);

    return;
}

## blocking logic will be applied not here, but on reception of bad attempts/brute force, from Core --> WebRTC Gateway
route[TRUSTED] {

    ds_is_from_list();

    if (is_method("KDMQ|INVITE"))
        return;

    ## TODO: https://github.com/kamailio/kamailio/issues/4338 (need to take a look into this) - alternative to be able to authenticate via dns, at this point only works for the first resolved one
    ## if (ds_is_from_list("3") || is_myself("$si")) ## to test with ds_dns_match_all
    if (is_myself("$si") || is_myself("$ru"))
        return;

    xlog("L_WARN", "[TRUSTED] Received a request from a source different from WebRTC-Gateway pool, strange... --> $$si --> $si\n");
    drop();

}
