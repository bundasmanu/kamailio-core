route[INIT_REQ_DISPATCH] {

    route(LOCATION);

    route(ASSERT_DIRECTION);

    route(RECORD_ROUTE);

    route(DISPATCH);

}

route[INIT_REQ_PRELOAD_ROUTE] {

    if(is_present_hf("Route")) {
        if($avp(ds_info) == $null) {
            remove_hf("Route");
            msg_apply_changes();
        } else {
            if(!loose_route_preloaded()) {
                sl_send_reply("404" "Error loose route out-of-dialog Request");
                exit;
            }

            route(RECORD_ROUTE);
            route(RELAY);
        }
    }

}
